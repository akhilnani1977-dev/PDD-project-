name: e2e

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  selenium-tests:
    name: Selenium - Website Tests (300)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Start Next.js Development Server
        run: |
          npm run dev &
          echo "Waiting for dev server to start on port 3000..."
          npx wait-on http://localhost:3000 --timeout 60000
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://wyqgznxflwlapbipmcal.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'dummy' }}

      - name: Install Selenium Node dependencies
        run: |
          cd selenium
          npm install

      - name: Run Web Selenium E2E Tests
        run: |
          cd selenium
          node run_selenium_tests.js

      - name: Upload Web E2E Excel Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: selenium-web-report
          path: |
            selenium/Selenium_E2E_Test_Report_Traverse.xlsx
            selenium/selenium_report.json

  appium-tests:
    name: Appium - Android Tests (300)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: appium/requirements.txt

      - name: Install Python dependencies
        run: |
          cd appium
          pip install -r requirements.txt

      - name: Run Appium E2E Automation
        run: |
          cd appium
          python run_appium_tests.py

      - name: Upload Mobile Appium Excel Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: appium-android-report
          path: |
            appium/Appium_E2E_Test_Report_Traverse.xlsx
            appium/appium_report.json

  unit-tests:
    name: Unit Tests - API (300)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install openpyxl pandas

      - name: Run Unit Tests
        run: |
          python unit-tests/run_unit_tests.py

      - name: Upload Unit Excel Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: |
            unit-tests/Unit_Test_Report_Traverse.xlsx
            unit-tests/unit_report.json

  validation-tests:
    name: Validation Tests (300)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install openpyxl pandas

      - name: Run Validation Tests
        run: |
          python validation-tests/run_validation_tests.py

      - name: Upload Validation Excel Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: validation-test-report
          path: |
            validation-tests/Validation_Test_Report_Traverse.xlsx
            validation-tests/validation_report.json

  deployment-tests:
    name: Deployment Status (300)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install openpyxl pandas

      - name: Run Deployment Tests
        run: |
          python deployment-tests/run_deployment_tests.py

      - name: Upload Deployment Excel Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-test-report
          path: |
            deployment-tests/Deployment_Test_Report_Traverse.xlsx
            deployment-tests/deployment_report.json

  load-tests:
    name: Load Testing - Performance (300)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install openpyxl pandas

      - name: Run Load Tests
        run: |
          python load-tests/run_load_tests.py

      - name: Upload Load Excel Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: load-test-report
          path: |
            load-tests/Load_Test_Report_Traverse.xlsx
            load-tests/load_report.json

  compile-and-deploy:
    name: Compile Master Report & Deploy
    runs-on: ubuntu-latest
    needs: [selenium-tests, appium-tests, unit-tests, validation-tests, deployment-tests, load-tests]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install openpyxl pandas

      - name: Download Selenium Artifact
        uses: actions/download-artifact@v4
        with:
          name: selenium-web-report
          path: ./

      - name: Download Appium Artifact
        uses: actions/download-artifact@v4
        with:
          name: appium-android-report
          path: ./

      - name: Download Unit Artifact
        uses: actions/download-artifact@v4
        with:
          name: unit-test-report
          path: ./

      - name: Download Validation Artifact
        uses: actions/download-artifact@v4
        with:
          name: validation-test-report
          path: ./

      - name: Download Deployment Artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-test-report
          path: ./

      - name: Download Load Artifact
        uses: actions/download-artifact@v4
        with:
          name: load-test-report
          path: ./

      - name: Compile Consolidated Master Report & Dashboard
        run: |
          python compile_reports.py

      - name: Upload Consolidated E2E Master Excel Report
        uses: actions/upload-artifact@v4
        with:
          name: full-e2e-report
          path: deploy_site/Full_E2E_Test_Report_Traverse.xlsx

      - name: Upload GitHub Pages Build Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: deploy_site/

      - name: Deploy Dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy_site
