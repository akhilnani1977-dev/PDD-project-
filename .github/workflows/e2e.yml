name: Enterprise CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  NODE_ENV: production
  PYTHON_ENV: production
  DB_HOST: localhost

# ─────────────────────────────────────────────
# JOB 1: SELENIUM — Website Tests (420)
# ─────────────────────────────────────────────
jobs:
  selenium-tests:
    name: Selenium — Website Tests (420)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Verify Environment Variables
        run: |
          echo "NODE_ENV=$NODE_ENV"
          if [ -z "$NODE_ENV" ]; then echo "::error::Missing NODE_ENV" && exit 1; fi
          echo "✅ Environment variables verified."

      - name: Install Node Dependencies
        run: |
          if [ -f package.json ]; then
            npm ci --prefer-offline 2>/dev/null || npm install --prefer-offline 2>/dev/null || echo "Dependency install skipped."
          else
            echo "No package.json — skipping npm install."
          fi

      - name: Install Selenium Test Dependencies
        run: |
          cd selenium
          if [ -f package.json ]; then
            npm ci --prefer-offline 2>/dev/null || npm install 2>/dev/null || true
          fi
          npm install --no-save exceljs 2>/dev/null || true

      - name: Run Selenium Test Suite (420 Cases, Retry x3)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: |
            cd selenium
            echo "============================================================"
            echo " Traverse Selenium E2E Test Runner"
            echo "============================================================"
            node run_selenium_tests.js
            echo "============================================================"
            echo " Selenium Test Execution Complete"
            echo "============================================================"

      - name: Generate Selenium HTML Report
        run: |
          python generate_suite_report.py \
            --json selenium/selenium_report.json \
            --output reports/selenium-web-report.html \
            --title "🌐 Selenium Web E2E Test Report" \
            --subtitle "Traverse — Website Test Suite | Runner: Selenium WebDriver + Node.js" \
            --type selenium
          echo "✅ Selenium HTML report generated successfully."

      - name: Upload Selenium Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: selenium-web-report
          path: |
            reports/selenium-web-report.html
            selenium/selenium_report.json
            selenium/Selenium_E2E_Test_Report_Traverse.xlsx
          retention-days: 30

# ─────────────────────────────────────────────
# JOB 2: APPIUM — Android Tests (420)
# ─────────────────────────────────────────────
  appium-tests:
    name: Appium — Android Tests (420)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Appium Test Dependencies
        run: |
          pip install openpyxl 2>/dev/null || true
          cd appium
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt 2>/dev/null || true
          fi
          pip install pandas 2>/dev/null || true
          echo "✅ Dependencies installed."

      - name: Run Appium Android Test Suite (420 Cases, Retry x3)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: |
            cd appium
            echo "============================================================"
            echo " Traverse Android Appium Test Runner"
            echo "============================================================"
            python run_appium_tests.py
            echo "============================================================"
            echo " Appium Test Execution Complete"
            echo "============================================================"

      - name: Generate Appium HTML Report
        run: |
          python generate_suite_report.py \
            --json appium/appium_report.json \
            --output reports/appium-android-report.html \
            --title "📱 Appium Android E2E Test Report" \
            --subtitle "Traverse — Android Mobile Test Suite | Runner: Appium UiAutomator2" \
            --type appium
          echo "✅ Appium Android HTML report generated."

      - name: Upload Appium Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: appium-android-report
          path: |
            reports/appium-android-report.html
            appium/appium_report.json
            appium/Appium_E2E_Test_Report_Traverse.xlsx
          retention-days: 30

# ─────────────────────────────────────────────
# JOB 3: UNIT TESTS — API (420)
# ─────────────────────────────────────────────
  api-tests:
    name: Unit Tests — API (420)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Unit Test Dependencies
        run: |
          pip install openpyxl 2>/dev/null || true
          echo "✅ Dependencies installed."

      - name: Run API Unit Test Suite (420 Cases, Retry x3)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: |
            cd unit-tests
            echo "============================================================"
            echo " Traverse API Unit Test Runner"
            echo "============================================================"
            python run_unit_tests.py
            echo "============================================================"
            echo " Unit Test Execution Complete"
            echo "============================================================"

      - name: Generate Unit Test HTML Report
        run: |
          python generate_suite_report.py \
            --json unit-tests/unit_report.json \
            --output reports/unit-test-report.html \
            --title "⚙️ API Unit Test Report" \
            --subtitle "Traverse — Backend API & DB Unit Tests | Runner: Python Unit Tests" \
            --type api
          echo "✅ Unit test HTML report generated."

      - name: Upload Unit Test Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: |
            reports/unit-test-report.html
            unit-tests/unit_report.json
            unit-tests/Unit_Test_Report_Traverse.xlsx
          retention-days: 30

# ─────────────────────────────────────────────
# JOB 4: VALIDATION TESTS (420)
# ─────────────────────────────────────────────
  validation-tests:
    name: Validation Tests (420)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Validation Test Dependencies
        run: |
