name: E2E Test Report + Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  selenium-e2e-web-api-tests:
    name: Selenium E2E Web + API Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Start Next.js Development Server
        run: |
          npm run dev &
          echo "Waiting for dev server to start on port 3000..."
          npx wait-on http://localhost:3000 --timeout 60000
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://wyqgznxflwlapbipmcal.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy

      - name: Install Selenium Node dependencies
        run: |
          cd selenium
          npm install

      - name: Run Web Selenium E2E Tests
        run: |
          cd selenium
          node run_selenium_tests.js

      - name: Upload Web E2E Excel Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Web + API Tests
          path: selenium/Selenium_E2E_Test_Report_Traverse.xlsx

  appium-mobile-tests-dry-run:
    name: Appium Mobile Tests Dry-Run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: appium/requirements.txt

      - name: Install Python dependencies
        run: |
          cd appium
          pip install -r requirements.txt

      - name: Run Appium Dry-Run & Report compiler
        run: |
          cd appium
          python run_appium_tests.py

      - name: Upload Mobile Appium Excel Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mobile Tests Dry-Run
          path: appium/Appium_E2E_Test_Report_Traverse.xlsx

  deploy-github-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [selenium-e2e-web-api-tests]
    steps:
      - name: Echo Deployment message
        run: |
          echo "🚀 Deploying generated test report pages to GitHub Pages..."
          echo "Simulating deployment steps to peaceiris/actions-gh-pages..."
          echo "Deployment successful!"

  generate-lifelink-test-reports:
    name: Generate Lifelink Test Reports
    runs-on: ubuntu-latest
    needs: [selenium-e2e-web-api-tests, appium-mobile-tests-dry-run]
    steps:
      - name: Download Selenium Excel Artifact
        uses: actions/download-artifact@v4
        with:
          name: Web + API Tests
          path: reports/web/

      - name: Download Appium Excel Artifact
        uses: actions/download-artifact@v4
        with:
          name: Mobile Tests Dry-Run
          path: reports/mobile/

      - name: Consolidate Reports
        run: |
          echo "Bundling all test spreadsheets..."
          mkdir -p consolidated_reports
          cp reports/web/Selenium_E2E_Test_Report_Traverse.xlsx consolidated_reports/
          cp reports/mobile/Appium_E2E_Test_Report_Traverse.xlsx consolidated_reports/
          echo "Report consolidation complete!"

      - name: Upload Consolidated Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Report.xlsx
          path: consolidated_reports/
